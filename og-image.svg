<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative line -->
  <rect x="80" y="280" width="60" height="4" rx="2" fill="#d4a574"/>

  <!-- Site name -->
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#1a1a1a">雅俗共赏</text>

  <!-- Tagline -->
  <text x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#666666">记录技术、阅读与开源更新</text>

  <!-- URL -->
  <text x="80" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#999999">blog.yuyins.com</text>

  <!-- Decorative elements -->
  <circle cx="1050" cy="120" r="80" fill="#d4a57420"/>
  <circle cx="1100" cy="500" r="60" fill="#d4a57415"/>
  <rect x="950" y="200" width="4" height="200" rx="2" fill="#d4a57430"/>
</svg>
